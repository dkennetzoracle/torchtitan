# Kueue resources for torchtitan health-check jobs on BM.GPU.MI300X.8 nodes.
#
# Apply once per cluster:
#   kubectl apply -f kubernetes/kueue-mi300x.yaml
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: bm-gpu-mi300x-8
spec:
  nodeLabels:
    node.kubernetes.io/instance-type: BM.GPU.MI300X.8
    amd.com/gpu: "true"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: torchtitan-mi300x-queue
spec:
  namespaceSelector: {}
  resourceGroups:
  - coveredResources: ["cpu", "memory", "amd.com/gpu", "ephemeral-storage"]
    flavors:
    - name: bm-gpu-mi300x-8
      resources:
      - name: cpu
        nominalQuota: "5000"
      - name: memory
        nominalQuota: "204800Gi"
      - name: amd.com/gpu
        nominalQuota: "1600"
      - name: ephemeral-storage
        nominalQuota: "12800Gi"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: torchtitan-mi300x
  namespace: default
spec:
  clusterQueue: torchtitan-mi300x-queue

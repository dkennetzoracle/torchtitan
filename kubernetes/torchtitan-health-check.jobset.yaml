# torchtitan health-check JobSet for OCI OKE — AMD MI300X (BM.GPU.MI300X.8)
#
# Runs llama3-8B with synthetic data for 20 steps and reports TFLOPs.
# No dataset download or tokenizer required.
#
# Customisation:
#   NNODES  - number of GPU nodes (default 4, one pod per node)
#   IMAGE   - torchtitan container image
#
# Quick start (4 nodes = 32 GPUs):
#   kubectl apply -f kubernetes/torchtitan-health-check.jobset.yaml
#
# Single-node smoke test:
#   NNODES=1 envsubst < kubernetes/torchtitan-health-check.jobset.yaml | kubectl apply -f -
#
# The JobSet controller creates a headless Service named after the JobSet.
# Pod-0 (JOB_COMPLETION_INDEX=0) acts as the torchrun rendezvous master; its
# stable DNS address is derived at runtime from the pod hostname.
---
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: torchtitan-health-check
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: torchtitan-mi300x
spec:
  # Restart the entire JobSet on any failure (set to 0 for one-shot health checks)
  failurePolicy:
    maxRestarts: 0

  replicatedJobs:
  - name: workers
    # One copy of the Job; increase for multi-replica experiments.
    replicas: 1
    template:
      spec:
        # Each pod = one physical node (8 GPUs).
        # Change completions/parallelism to run on fewer nodes.
        completions: 4
        parallelism: 4
        completionMode: Indexed
        # Never restart individual pods — a failure fails the whole JobSet.
        template:
          spec:
            restartPolicy: Never
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet

            nodeSelector:
              node.kubernetes.io/instance-type: BM.GPU.MI300X.8
              amd.com/gpu: "true"

            tolerations:
            - key: amd.com/gpu
              operator: Exists

            volumes:
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 128Gi
            - name: devinf
              hostPath:
                path: /dev/infiniband

            containers:
            - name: torchtitan
              # Override IMAGE at deploy time or edit below.
              image: iad.ocir.io/iduyx1qnmway/torchtitan:rocm-latest
              imagePullPolicy: Always

              command: ["/bin/bash", "-c"]
              args:
              - |
                set -euo pipefail

                # ── Rendezvous setup ────────────────────────────────────────
                # With hostNetwork=true the OS hostname is the node hostname, not
                # the pod name.  Per OCI docs we must supply:
                #   --rdzv-conf=is_host=<true|false>  so rank-0 explicitly owns the
                #                                     c10d TCPStore server
                #   --local_addr=<pod-K8s-hostname>   so torchrun knows its own
                #                                     cluster-routable address
                #
                # JobSet sets spec.hostname=<jobset>-workers-0-<index> on each pod
                # and creates a headless Service named <jobset>; those together
                # form the stable DNS name we use as the rendezvous endpoint.
                NODE_RANK="${JOB_COMPLETION_INDEX}"
                NPROC_PER_NODE="8"
                # Full FQDN for this pod — resolvable from hostNetwork pods via cluster DNS
                POD_FQDN="${JOBSET_NAME}-workers-0-${NODE_RANK}.${JOBSET_NAME}.${POD_NAMESPACE}.svc.cluster.local"
                MASTER_ADDR="${JOBSET_NAME}-workers-0-0.${JOBSET_NAME}.${POD_NAMESPACE}.svc.cluster.local"
                MASTER_PORT="29500"
                IS_HOST=$([ "${NODE_RANK}" -eq "0" ] && echo "true" || echo "false")

                echo "torchtitan health-check | node_rank=${NODE_RANK}/${NNODES} is_host=${IS_HOST} local_addr=${POD_FQDN} master=${MASTER_ADDR}:${MASTER_PORT}"

                torchrun \
                  --nnodes="${NNODES}" \
                  --nproc_per_node="${NPROC_PER_NODE}" \
                  --rdzv-backend=c10d \
                  --rdzv-endpoint="${MASTER_ADDR}:${MASTER_PORT}" \
                  --rdzv-conf="is_host=${IS_HOST}" \
                  --rdzv-id="${JOBSET_NAME}" \
                  --local_addr="${POD_FQDN}" \
                  --node_rank="${NODE_RANK}" \
                  -m torchtitan.train \
                    --module llama3 \
                    --config llama3_health_check \
                  2>&1 | tee /tmp/torchtitan.log

                # ── Health-check report (printed on every node, visible in pod logs) ──
                # Extract the last reported TFLOPs value from the training log.
                TFLOPS=$(grep -oP 'tflops:\s*\K[0-9,]+\.?[0-9]*' /tmp/torchtitan.log | tail -1 | tr -d ',')
                MFU=$(grep -oP 'mfu:\s*\K[0-9.]+(?=%)' /tmp/torchtitan.log | tail -1)
                echo ""
                echo "==========================================="
                echo "TORCHTITAN HEALTH CHECK RESULT"
                echo "  Node rank : ${NODE_RANK}"
                echo "  TFLOPs    : ${TFLOPS:-N/A}"
                echo "  MFU       : ${MFU:-N/A}%"
                echo "  Status    : PASS"
                echo "==========================================="

              env:
              # ── Identity / addressing ────────────────────────────────────
              - name: NNODES
                value: "4"
              # ── Training workload knobs ──────────────────────────────────
              - name: LOCAL_BATCH_SIZE
                value: "20"
              - name: SEQ_LEN
                value: "8192"
              - name: STEPS
                value: "25"
              - name: COMPILE
                value: "0"
              - name: JOBSET_NAME
                value: "torchtitan-health-check"
              - name: POD_NAMESPACE
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace

              # ── ROCm / RCCL / RDMA (BM.GPU.MI300X.8) ───────────────────
              # Source: https://github.com/oracle-quickstart/oci-hpc-oke/
              #         manifests/rccl-tests/kueue/BM.GPU.MI300X.8.yaml
              - name: NCCL_DEBUG
                value: "WARN"
              - name: NCCL_IB_HCA
                value: "=mlx5_0,mlx5_2,mlx5_3,mlx5_4,mlx5_5,mlx5_7,mlx5_8,mlx5_9"
              - name: NCCL_IB_GID_INDEX
                value: "3"
              - name: NCCL_IB_TC
                value: "41"
              - name: NCCL_IB_SL
                value: "0"
              - name: NCCL_IB_TIMEOUT
                value: "22"
              - name: NCCL_IB_QPS_PER_CONNECTION
                value: "1"
              - name: NCCL_IB_SPLIT_DATA_ON_QPS
                value: "0"
              - name: NCCL_CUMEM_ENABLE
                value: "0"
              - name: NCCL_NET_PLUGIN
                value: "none"
              - name: NCCL_PXN_DISABLE
                value: "0"
              - name: HCOLL_ENABLE_MCAST_ALL
                value: "0"
              - name: coll_hcoll_enable
                value: "0"
              - name: UCX_NET_DEVICES
                value: "mlx5_0:1"
              - name: RX_QUEUE_LEN
                value: "8192"
              - name: IB_RX_QUEUE_LEN
                value: "8192"
              # Use host network eth0 for the torchrun TCP rendezvous
              - name: NCCL_SOCKET_IFNAME
                value: "eth0"

              # ── PyTorch / ROCm ───────────────────────────────────────────
              - name: PYTORCH_ALLOC_CONF
                value: "expandable_segments:True"
              # hipBLASlt fails with INVALID_VALUE on non-contiguous FSDP2-gathered
              # weight tensors; fall back to rocBLAS which handles these layouts.
              - name: TORCH_BLAS_PREFER_HIPBLASLT
                value: "0"

              resources:
                limits:
                  amd.com/gpu: "8"
                  ephemeral-storage: "32Gi"
                requests:
                  amd.com/gpu: "8"
                  cpu: "100"
                  memory: "1Ti"
                  ephemeral-storage: "32Gi"

              securityContext:
                privileged: true
                capabilities:
                  add: ["IPC_LOCK", "SYS_PTRACE"]

              volumeMounts:
              - mountPath: /dev/shm
                name: shm
              - mountPath: /dev/infiniband
                name: devinf
